name: deploy

# Manual trigger + on push to main. Runs on the shared self-hosted runner.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          echo "Runner: $(hostname)"
          echo "User:   $(whoami)"
          echo "CWD:    $(pwd)"

      # ------------------------------------------------------------------
      # Deployment step. Contributors customise the commands below.
      # ------------------------------------------------------------------
      - name: Run deployment
        run: bash scripts/deploy.sh
